<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <!-- RESPONSIVIDADE -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Carta de Serviços ao Usuário v2</title>
    <link rel="stylesheet" href="style_bootstrap.css">
    <!-- BOOTSTRAP CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-light">

    <!-- =========================
       HEADER ========================== -->

    <header class="bg-white shadow-sm py-3 mb-4">
        <div class="container d-flex flex-column flex-md-row align-items-center justify-content-between">

            <div class="d-flex align-items-center gap-3">
                <img src="17_brasao.png" alt="Logofw-bold" class="logo-prefeitura-bootstrap">
                <h1 lass="h4 mb-0 text-primary fw-bold"> Carta de Serviços ao Usuário
                </h1>
            </div>

            <div class="text-muted mt-2 mt-md-0">
                Última atualização:
                <strong id="dataAtualizacao">--/--/----</strong>
            </div>
        </div>
    </header>

  <div class="container text-center my-3">
            <a href="index.html" class="btn btn-sm btn-outline-secondary">Versao atual</a>
        </div>

    <!-- =========================
       TÍTULO
  ========================== -->
   <div class="container mb-4">
  <div class="row g-3 align-items-end">

    <!-- BUSCA -->
    <div class="col-12 col-md-4">
      <label class="form-label">Buscar serviço</label>
      <input
        type="text"
        id="buscaServico"
        class="form-control"
        placeholder="Digite o nome do serviço"
      >
    </div>

    <!-- SECRETARIA -->
    <div class="col-12 col-md-2">
      <label class="form-label">Secretaria</label>
      <select id="filtroSecretaria" class="form-select">
        <option value="">Todas</option>
      -->      </select>
    <div class="col-12 col-md-2">
      <label class="form-label">Unidade</label>
      <select id="filtroUnidade" class="form-select">
        <option value="">Todas</option>
      </select>
    </div>

    <!-- SERVIÇO -->
    <div class="col-12 col-md-2">
      <label class="form-label">Serviço</label>
      <select id="filtroServico" class="form-select">
        <option value="">Todos</option>
      </select>
    </div>

    <!-- BOTÃO LIMPAR -->
    <div class="col-12 col-md-2 d-grid">
      <button
        id="btnLimparFiltros"
        class="btn btn-outline-secondary"
        type="button"
      >
        Limpar filtros
      </button>
    </div>

  </div>
</div>
    </div>


<!-- Contar resultados-->
<div class="container mb-3">
  <div id="contadorResultados" class="text-muted small">
    </div>
</div>

    <!-- JS preenche -->
  
    <!-- =========================
       ACCORDION (BOOTSTRAP)
  ========================== -->
    <div class="container mb-5">
        <div class="accordion" id="listaServicos">
        </div>
    </div>

    <!-- BOOTSTRAP JS (necessário para accordion) -->
    <!-- JavaScript Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-u1OknCvxWvY5kfmNBILK2hRnQC3Pr17a+RTT6rIHI7NnikvbZlHgTPOOmMi466C8"
        crossorigin="anonymous"></script>

    <!-- SEU JS -->
    <script src="app-bootstrap.js"></script>

</body>

</html>
